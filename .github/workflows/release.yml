name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: import-lint

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross_gnu: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross toolchain
        if: matrix.cross_gnu
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release -p import-lint --target ${{ matrix.target }}

      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.cross_gnu }}" = "true" ]; then
            aarch64-linux-gnu-strip "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          else
            strip "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          staging="${BIN_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$staging/"
          cp LICENSE README.md "$staging/"
          tar czf "${staging}.tar.gz" "$staging"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          staging="${BIN_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "$staging/"
          cp LICENSE README.md "$staging/"
          7z a "${staging}.zip" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
