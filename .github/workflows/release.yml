name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: import-lint

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # npm_key maps each Rust target to the Node-style os-cpu-libc key
          # used by npm/platform/<key> (docs/PLAN.md P1/P3) — the resolving
          # code (the npm shim) speaks process.platform/process.arch, not
          # Rust triples.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            npm_key: linux-x64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
            npm_key: linux-x64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross_gnu: true
            npm_key: linux-arm64-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            npm_key: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            npm_key: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            npm_key: win32-x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross toolchain
        if: matrix.cross_gnu
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release -p import-lint --target ${{ matrix.target }}

      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.cross_gnu }}" = "true" ]; then
            aarch64-linux-gnu-strip "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          else
            strip "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          staging="${BIN_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$staging/"
          cp LICENSE README.md "$staging/"
          tar czf "${staging}.tar.gz" "$staging"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          staging="${BIN_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "$staging/"
          cp LICENSE README.md "$staging/"
          7z a "${staging}.zip" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

      # Separate from the archive above: npm-assemble needs the *raw* binary
      # (npm/scripts/assemble.mjs copies it straight into a platform
      # package), not the tar.gz/zip release archive.
      - name: Upload npm binary
        uses: actions/upload-artifact@v4
        with:
          name: npm-binary-${{ matrix.npm_key }}
          path: |
            target/${{ matrix.target }}/release/${{ env.BIN_NAME }}
            target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe
          if-no-files-found: ignore

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # Scoped to the release archives only — npm-binary-* (raw
          # binaries) and npm-packages (the assembled npm tree) are inputs
          # to the npm pipeline below, not release assets.
          pattern: ${{ env.BIN_NAME }}-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  npm-assemble:
    name: npm-assemble
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download npm binaries
        uses: actions/download-artifact@v4
        with:
          pattern: npm-binary-*
          path: npm-dist

      - name: Flatten binary artifact layout
        # download-artifact (without merge-multiple) lands each artifact in
        # its own dir named after the artifact: npm-dist/npm-binary-<key>/.
        # assemble.mjs expects <dist>/<key>/import-lint(.exe), so strip the
        # "npm-binary-" prefix from each dir name.
        run: |
          for d in npm-dist/npm-binary-*; do
            mv "$d" "npm-dist/${d##*/npm-binary-}"
          done

      - name: Assemble npm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node npm/scripts/assemble.mjs --version "$VERSION" --dist npm-dist
          # assemble.mjs itself fails loudly (before writing anything) if any
          # of the six platform binaries is missing — a half-release must be
          # impossible (docs/PLAN.md P5/P6).

      - name: Sanity-check assembled tree
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "\"version\": \"$VERSION\"" npm/import-lint/package.json; then
            echo "::error::npm/import-lint/package.json is not stamped with version $VERSION"
            exit 1
          fi
          for dir in npm/platform/*/; do
            key="$(basename "$dir")"
            if [ ! -f "${dir}import-lint" ] && [ ! -f "${dir}import-lint.exe" ]; then
              echo "::error::${dir} is missing its binary"
              exit 1
            fi
          done

      - name: Archive assembled npm tree
        # tar (not the upload-artifact zip) preserves the binaries'
        # executable bits — actions/upload-artifact does not, which would
        # otherwise silently break npm-smoke/npm-publish on unix runners.
        run: tar -cf npm-packages.tar npm

      - name: Upload assembled npm tree
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: npm-packages.tar

  npm-smoke:
    name: npm-smoke (${{ matrix.os }})
    needs: npm-assemble
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # No checkout: npm-packages.tar carries both the scripts and the
      # packages, and smoke.mjs (in --assembled mode) doesn't touch anything
      # else in the repo.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download assembled npm tree
        uses: actions/download-artifact@v4
        with:
          name: npm-packages

      - name: Extract
        shell: bash
        run: tar -xf npm-packages.tar

      - name: Smoke test
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node npm/scripts/smoke.mjs --assembled npm --expect-version "$VERSION"

  npm-publish:
    name: npm-publish
    needs: [npm-assemble, npm-smoke, release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC trusted publishing + provenance
      contents: read
    steps:
      # Auth is OIDC trusted publishing (no NPM_TOKEN): each package on
      # npmjs.com is configured to trust this repo's release.yml (see
      # docs/RELEASING.md). Two requirements are load-bearing here:
      #   - npm >= 11.5.1, or the registry silently treats the client as
      #     anonymous and publish fails with a misleading 404 — hence
      #     Node 24 (bundles npm 11) plus an explicit npm upgrade;
      #   - NODE_AUTH_TOKEN must be completely unset (even an empty string
      #     makes npm use token auth instead of falling back to OIDC), so
      #     the publish step deliberately has no `env:` block.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Update npm (OIDC publish needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Download assembled npm tree
        uses: actions/download-artifact@v4
        with:
          name: npm-packages

      - name: Extract
        run: tar -xf npm-packages.tar

      - name: Publish
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Platform packages first, main package last — a locked product
          # decision (docs/PLAN.md P5): the main package (which pins exact
          # platform versions via optionalDependencies) must never be live
          # while a platform package it depends on is missing.
          PACKAGES=(
            npm/platform/darwin-arm64
            npm/platform/darwin-x64
            npm/platform/linux-arm64-gnu
            npm/platform/linux-x64-gnu
            npm/platform/linux-x64-musl
            npm/platform/win32-x64
            npm/import-lint
          )

          for dir in "${PACKAGES[@]}"; do
            name="$(node -p "require('./${dir}/package.json').name")"
            # Idempotency (docs/PLAN.md P5): a re-run of this job (e.g. after
            # a mid-sequence failure) must be safe. Checking the registry
            # first — rather than `npm publish || true` — makes a *real*
            # publish failure (bad credentials, bad tarball, etc.) still
            # fail the job instead of being silently swallowed.
            if npm view "${name}@${VERSION}" version >/dev/null 2>&1; then
              echo "skip: ${name}@${VERSION} already published"
            else
              # --provenance is automatic under trusted publishing, but kept
              # explicit so a silent fallback to any other auth path can
              # never publish without an attestation.
              npm publish "$dir" --provenance --access public
            fi
          done
