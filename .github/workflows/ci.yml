name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build
        run: cargo build --workspace

      # npm distribution shim tests (docs/PLAN-npm.md §5) — plain `node --test`,
      # no deps, no Rust needed. Run once on the linux leg. Pinned to Node 18
      # (the `engines.node` floor, docs/PLAN-npm.md P7) to catch compat issues
      # early. Shell-expanded file list (not a bare directory, which Node's
      # test runner mishandles on some versions; not a quoted glob, which
      # `node --test` only understands from Node 21).
      - name: Install Node.js
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v7
        with:
          node-version: 18

      - name: npm shim tests
        if: matrix.os == 'ubuntu-latest'
        run: node --test npm/import-lint/test/*.test.js

  vscode-extension:
    name: vscode-extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package (esbuild + vsce package)
        run: npm run package
